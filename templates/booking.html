<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santi Styles | Bookings</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* extra styles just for this page to keep it clean */
        .booking-hero {
            background: linear-gradient(rgba(15, 21, 31, 0.8), rgba(15, 21, 31, 0.8)), 
                        url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&q=80&w=1000') center/cover;
            padding: 120px 20px 60px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            margin-bottom: 40px;
        }

        .booking-glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            max-width: 650px;
            margin: -60px auto 50px;
            position: relative;
            z-index: 5;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 5px;
        }

        .input-row div { flex: 1; }

        label {
            display: block;
            color: var(--primary-gold);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

      
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-gold);
            background: rgba(0, 0, 0, 0.5);
        }

        select option { background: #1a1a1a; }
        select option:disabled { color: #ff4d4d; }

        .terms-alert {
            background: rgba(57, 147, 221, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-gold);
            margin: 10px 0 25px;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <header>
        <nav>
    
            <a href="https://www.instagram.com/santi.styles/" target="_blank" class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 448 512">
                    <path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/>
                </svg>
            </a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/booking">BOOK NOW</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="booking-hero">
            <h1>Book an Appointment</h1>
            <p>Book in to secure your spot for not just a haircut but a confidence boost</p>
        </section>

        <section class="booking-glass-panel">
            <form id="appointment-form">
                <label>Full Name</label>
                <input type="text" id="cust-name" required placeholder="Enter your name">

                <div class="input-row">
                    <div>
                        <label>Email</label>
                        <input type="email" id="cust-email" required placeholder="email@example.com">
                    </div>
                    <div>
                        <label>Phone</label>
                        <input type="tel" id="cust-phone" required placeholder="64+ 000 0000...">
                    </div>
                </div>

                <label>Select Service</label>
                <select id="cust-service" required>
                    <option value="" disabled selected>Pick a service</option>
                    <option value="Haircut + Fade ($30)">Haircut + Fade - $30</option>
                    <option value="Haircut + Fade + Design ($35)">Haircut + Fade + Design - $35</option>
                    <option value="Buzz Cut ($25)">Buzz Cut - $25</option>
                    <option value="Kids Haircut ($20)">Kids Haircut - $20</option>
                </select>

                <div class="input-row">
                    <div>
                        <label>Date</label>
                        <input type="date" id="cust-date" required style="color-scheme: dark;">
                    </div>
                    <div>
                        <label>Time Slot</label>
                        <select id="cust-time" required disabled>
                            <option value="" disabled selected>Select Date</option>
                            <!-- times of avilablity -->
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="09:45 AM">09:45 AM</option>
                            <option value="10:30 AM">10:30 AM</option>
                            <option value="11:15 AM">11:15 AM</option>
                            <option value="12:00 PM">12:00 PM</option>
                            <option value="12:45 PM">12:45 PM</option>
                            <option value="01:30 PM">01:30 PM</option>
                            <option value="02:15 PM">02:15 PM</option>
                            <option value="03:00 PM">03:00 PM</option>
                            <option value="03:45 PM">03:45 PM</option>
                            <option value="04:30 PM">04:30 PM</option>
                        </select>
                    </div>
                </div>

                <div class="terms-alert">
                    <strong>Note:</strong> Shop location is sent after confirmation. Please bring <strong>CASH ONLY</strong> for payment.
                </div>

                <button type="submit" class="cta-button" style="width: 100%;">Confirm Booking</button>
            </form>
        </section>
    </main>


    <div id="booking-success-modal" class="modal" style="display: none;">
        <div class="modal-content" style="text-align: center; border-color: #22c55e;">
            <h2 style="color: #22c55e;">booking Set!</h2>
            <p>Your spot for the <strong id="modal-service-name"></strong> is confirmed.</p>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; margin: 20px 0;">
                <p style="margin: 0; font-size: 0.9rem; color: #94a3b8;">Total due:</p>
                <h3 style="margin: 5px 0; font-size: 2rem; color: #22c55e;" id="modal-price-val"></h3>
                <p style="color: #ff4d4d; font-size: 0.8rem; font-weight: bold;">CASH ONLY</p>
            </div>
            <button class="cta-button" onclick="window.location.href='/'">Okay.</button>
        </div>
    </div>

    <script>
     
        document.getElementById('cust-date').addEventListener('change', async function(e) {
            const dateVal = e.target.value;
            const timeDropdown = document.getElementById('cust-time');
            
            timeDropdown.disabled = false;
            timeDropdown.options[0].text = "Pick a time";

            const res = await fetch(`/api/booked-slots?date=${dateVal}`);
            const takenSlots = await res.json();

            Array.from(timeDropdown.options).forEach(opt => {
                if (takenSlots.includes(opt.value)) {
                    opt.disabled = true;
                    opt.text = opt.value + " (Full)";
                } else {
                    opt.disabled = false;
                    opt.text = opt.value;
                }
            });
        });


        document.getElementById('appointment-form').onsubmit = async function(e) {
            e.preventDefault();
            
            const bookingData = {
                name: document.getElementById('cust-name').value,
                email: document.getElementById('cust-email').value,
                phone: document.getElementById('cust-phone').value,
                service: document.getElementById('cust-service').value,
                date: document.getElementById('cust-date').value,
                time: document.getElementById('cust-time').value
            };

            const response = await fetch('/booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });

            const result = await response.json();

            if (response.ok) {
               
                const priceMatch = bookingData.service.match(/\(\$(\d+)\)/);
                document.getElementById('modal-service-name').innerText = bookingData.service.split(' (')[0];
                document.getElementById('modal-price-val').innerText = priceMatch ? "$" + priceMatch[1] : "TBD";
                document.getElementById('booking-success-modal').style.display = 'block';
            } else {
                alert(result.message);
            }
        };


        window.addEventListener('scroll', () => {
            document.querySelector('header').classList.toggle('scrolled', window.scrollY > 10);
        });
    </script>
</body>
</html>
