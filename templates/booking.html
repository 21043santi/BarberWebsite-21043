<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Santi Styles</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Specific tweaks for the booking page */
        .booking-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            max-width: 700px;
            margin: -40px auto 40px auto; 
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .flex-row { display: flex; gap: 20px; }
        .flex-row .form-group { flex: 1; }
        select {
            width: 100%;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--accent-white);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
        }
        .terms-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-gold);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/" class="nav-logo">Santi Styles</a>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/booking">BOOK NOW</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1000px; padding-bottom: 40px;">
        <section class="hero1">
            <h1 style="font-size: 2.5rem;">Secure Your Chair</h1>
        </section>

        <section class="booking-section">
            <form id="booking-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your name">
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" required placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" required placeholder="Phone number">
                    </div>
                </div>
                <div class="form-group">
                    <label>Service</label>
                    <select name="service" required>
                        <option value="" disabled selected>Select a service</option>
                        <option value="Haircut + Fade ($30)">Haircut + Fade - $30</option>
                        <option value="Haircut + Fade + Design ($35)">Haircut + Fade + Design - $35</option>
                        <option value="Buzz Cut ($25)">Buzz Cut - $25</option>
                    </select>
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date" id="booking-date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <select name="time" id="booking-time" required disabled>
                            <option value="" disabled selected>Select Date First</option>
                            <option value="09:00 AM">09:00 AM</option>
                            <option value="10:00 AM">10:00 AM</option>
                            <option value="11:00 AM">11:00 AM</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="cta-button" style="width: 100%;">Confirm Booking</button>
            </form>
        </section>
    </main>

    <script>
        // Only essential logic kept here
        document.getElementById('booking-date').addEventListener('change', async function(e) {
            const date = e.target.value;
            const timeSelect = document.getElementById('booking-time');
            timeSelect.disabled = false;
            
            const response = await fetch(`/api/booked-slots?date=${date}`);
            const booked = await response.json();

            Array.from(timeSelect.options).forEach(opt => {
                if (booked.includes(opt.value)) {
                    opt.disabled = true;
                    opt.text = opt.value + " (Full)";
                } else {
                    opt.disabled = false;
                    opt.text = opt.value;
                }
            });
        });

        document.getElementById('booking-form').onsubmit = async function(e) {
            e.preventDefault();
            const data = {
                name: document.querySelector('[name="name"]').value,
                email: document.querySelector('[name="email"]').value,
                phone: document.querySelector('[name="phone"]').value,
                service: document.querySelector('[name="service"]').value,
                date: document.querySelector('[name="date"]').value,
                time: document.querySelector('[name="time"]').value
            };
            const res = await fetch('/booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) alert("Booking confirmed!");
        };
    </script>
</body>
</html>
