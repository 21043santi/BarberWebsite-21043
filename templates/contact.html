<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santi Styles | Contact</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Shared premium layout matching the booking page */
        .booking-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            max-width: 700px;
            margin: -40px auto 40px auto; 
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .contact-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 25px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: rgba(57, 147, 221, 0.3);
        }

        .info-card h4 {
            color: var(--primary-gold);
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-card p {
            color: #cbd5e1;
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Modern Inputs for Email and Textarea */
        .modern-input {
            width: 100%;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--accent-white);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--primary-gold);
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 10px rgba(57, 147, 221, 0.2);
        }

        textarea.modern-input {
            resize: vertical;
            min-height: 120px;
        }

        .section-divider {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 30px 0;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="https://www.instagram.com/santi.styles/" target="_blank" class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" viewBox="0 0 448 512">
                    <path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/>
                </svg>
            </a>
            
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/booking">BOOK NOW</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1000px; padding-bottom: 40px;">
        <section class="hero1">
            <h1 style="font-size: 2.5rem;">Get in Touch</h1>
            <p style="margin-bottom: 0;">Have a question? We'd love to hear from you.</p>
        </section>

        <section class="booking-section">
            
            <!-- Contact Info Grid -->
            <div class="contact-info-grid">
                <div class="info-card">
                    <h4>Phone</h4>
                    <p>+64 21 024 56 837<br>021 024 56837</p>
                </div>
                <div class="info-card">
                    <h4>Email</h4>
                    <p>santifalla09@gmail.com</p>
                </div>
            </div>

            <hr class="section-divider">

            <!-- Contact Form -->
            <h3 style="margin-top: 0; font-size: 1.5rem;">Send Us a Message</h3>
            <form method="POST" action="/contact">
                
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="modern-input" required placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="modern-input" required placeholder="email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="modern-input" required placeholder="How can we help you today?"></textarea>
                </div>
                
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 10px;">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 67 Santi Styles. All rights reserved.</p>
    </footer>

    <script>
        // Smooth scrolling for the glass navbar
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 20) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
