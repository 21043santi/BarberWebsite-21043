            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/booking">BOOK NOW</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero1">
            <h1>Get in touch</h1>
 
        </section>

        <hr>

        <section>
            <h3>Contact Information</h3>
            <p><strong>Phone:</strong> 64+ 21 024 56 837 / 021 024 56837</p>
            <p><strong>Email:</strong> santifalla09@gmail.com</p>
            <p><strong>Hours:</strong><br>
            Monday - Friday: 4:00 PM - 9:00 PM<br>
            Saturday: 10:00 AM - 6:00 PM<br>
            Sunday: Closed</p>
        </section>

        <hr>

        <section>
            <h3>Send Us a Message</h3>
            <form method="POST" action="/contact">
                <div style="margin-bottom: 20px;">
                    <label for="name" style="display: block; margin-bottom: 5px;">Name:</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="email" style="display: block; margin-bottom: 5px;">Email:</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="message" style="display: block; margin-bottom: 5px;">Message:</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;"></textarea>
                </div>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 67 Santi Styles. All rights reserved.</p>
    </footer>

    <script>
      const header = document.querySelector('header');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 20) {
          header.classList.add('scrolled');
        } else {
          header.classList.remove('scrolled');
        }
      });
    </script>

</body>
</html>
